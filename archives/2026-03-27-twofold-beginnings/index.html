<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEWAIYORK · Twofold Beginnings</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Space Grotesk", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --bg: #09090d;
      --ink: #f8fbff;
      --ink-soft: rgba(248, 251, 255, 0.78);
      --accent: #98d7ff;
      --hero-background: radial-gradient(circle at 22% -5%, rgba(152, 215, 255, 0.42), transparent 52%), linear-gradient(140deg, #161924 0%, #1f3152 48%, #0e1018 100%);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--hero-background);
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      background-image: var(--photo, radial-gradient(circle at 22% -5%, rgba(152, 215, 255, 0.42), transparent 52%), linear-gradient(140deg, #161924 0%, #1f3152 48%, #0e1018 100%));
      background-size: cover;
      background-position: center;
      filter: saturate(1.05) contrast(1.05);
    }

    body::after {
      background: radial-gradient(circle at 25% 18%, rgba(0, 0, 0, 0.45), transparent 45%), linear-gradient(145deg, rgba(3, 5, 12, 0.85), rgba(3, 2, 8, 0.55));
    }

    .hud {
      position: fixed;
      top: 1rem;
      left: clamp(1rem, 4vw, 2.5rem);
      right: clamp(1rem, 4vw, 2.5rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      z-index: 4;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.72rem;
      z-index: 1;
    }

    .hud a {
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      padding-bottom: 2px;
    }

    .hud-metric {
      color: var(--ink-soft);
      font-size: 0.68rem;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 16vh clamp(1rem, 5vw, 4rem) 3rem;
      position: relative;
      z-index: 1;
    }

    .card {
      width: min(960px, 100%);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(5, 6, 12, 0.52);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.52);
      padding: clamp(1.2rem, 4vw, 2.8rem);
      display: grid;
      gap: 1rem;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: clamp(1.5rem, 5vw, 3.2rem);
      color: var(--accent);
    }

    .theme {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      color: var(--ink-soft);
    }

    .quote {
      margin: 0;
      font-size: clamp(1.35rem, 3.4vw, 2.4rem);
      line-height: 1.35;
      quotes: "“" "”";
    }

    .quote::before { content: open-quote; }
    .quote::after { content: close-quote; }

    .line {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 2.2rem);
      line-height: 1.35;
      max-width: 30ch;
    }

    .attribution {
      margin: 0;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(248, 251, 255, 0.8);
    }

    .keywords {
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0;
      list-style: none;
    }

    .keywords li {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(0, 0, 0, 0.25);
      padding: 0.35rem 0.75rem;
      font-size: 0.74rem;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 0.3rem;
    }

    .controls button {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.56rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.68rem;
      cursor: pointer;
    }

    .hint {
      margin: 0;
      font-size: 0.76rem;
      color: rgba(248, 251, 255, 0.62);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
  <script src="/assets/js/password-gate.js"></script>
</head>
<body data-edition="./twofold-beginnings.json" data-media-base="./assets">
  <header class="hud">
    <a href="../../">NewAIYork</a>
    <span class="hud-metric"><span id="index">01</span> / <span id="total">00</span></span>
    <a href="../../archive.html">Laurarchive</a>
  </header>

  <main>
    <section class="card" aria-live="polite">
      <h1 id="title">Twofold Beginnings</h1>
      <p class="theme" id="theme">Loading...</p>
      <p class="quote" id="quote">Loading quotes...</p>
      <p class="line" id="line">Loading concepts...</p>
      <p class="attribution" id="attribution"></p>
      <ul class="keywords" id="keywords"></ul>
      <div class="controls">
        <button type="button" data-step="-1">Prev</button>
        <button type="button" data-step="1">Next</button>
        <button type="button" id="shuffle">Shuffle</button>
      </div>
      <p class="hint">Tap background or use arrow keys to move through concepts.</p>
    </section>
  </main>

  <script>
    const titleEl = document.getElementById('title');
    const themeEl = document.getElementById('theme');
    const quoteEl = document.getElementById('quote');
    const lineEl = document.getElementById('line');
    const attributionEl = document.getElementById('attribution');
    const keywordsEl = document.getElementById('keywords');
    const indexEl = document.getElementById('index');
    const totalEl = document.getElementById('total');
    const controls = document.querySelectorAll('[data-step]');
    const shuffleButton = document.getElementById('shuffle');
    const root = document.documentElement;
    const mediaBase = (document.body.dataset.mediaBase || './assets').replace(/\/$/, '');

    let concepts = [];
    let current = 0;

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function renderKeywords(values = []) {
      keywordsEl.innerHTML = '';
      values.forEach((value) => {
        const chip = document.createElement('li');
        chip.textContent = value;
        keywordsEl.appendChild(chip);
      });
    }

    function applyBackdrop(concept) {
      const raw = typeof concept.image === 'string' ? concept.image.trim() : '';
      if (raw) {
        const cleaned = raw.startsWith('/') ? raw : `${mediaBase}/${raw.replace(/^\/+/, '')}`;
        root.style.setProperty('--photo', `url('${cleaned}')`);
      } else {
        root.style.setProperty('--photo', 'radial-gradient(circle at 20% -5%, rgba(152, 215, 255, 0.42), transparent 52%), linear-gradient(140deg, #161924 0%, #1f3152 48%, #0e1018 100%)');
      }
    }

    function renderConcept(concept) {
      if (!concept) return;
      titleEl.textContent = concept.title || 'Twofold Beginnings';
      const domainLabel = concept.domain ? concept.domain.toUpperCase() : 'CONCEPT';
      const themeLabel = concept.theme ? concept.theme : 'duality';
      themeEl.textContent = `${domainLabel} · ${themeLabel}`;
      quoteEl.textContent = concept.quote || concept.line || '';
      lineEl.textContent = concept.line || concept.quote || '';
      const attributionBits = [];
      if (concept.attribution) attributionBits.push(`— ${concept.attribution}`);
      if (concept.source) attributionBits.push(concept.source);
      attributionEl.textContent = attributionBits.join(' · ');
      renderKeywords(Array.isArray(concept.keywords) ? concept.keywords : []);
      applyBackdrop(concept);

      indexEl.textContent = pad(current + 1);
      totalEl.textContent = pad(concepts.length);

      root.style.setProperty('--accent', concept.color || '#98d7ff');
      root.style.setProperty('--hero-background', concept.background || 'linear-gradient(145deg, #171a27, #101218)');
    }

    function move(step) {
      if (!concepts.length) return;
      current = (current + step + concepts.length) % concepts.length;
      renderConcept(concepts[current]);
    }

    function shuffle() {
      if (concepts.length < 2) return;
      let next = current;
      while (next === current) {
        next = Math.floor(Math.random() * concepts.length);
      }
      current = next;
      renderConcept(concepts[current]);
    }

    async function loadConcepts() {
      const path = document.body.dataset.edition;
      try {
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) throw new Error('failed to load twofold edition data');
        const payload = await response.json();
        concepts = Array.isArray(payload) ? payload : [];

        if (!concepts.length) {
          lineEl.textContent = 'No concepts available yet.';
          themeEl.textContent = 'Theme · pending';
          return;
        }

        renderConcept(concepts[current]);
      } catch (error) {
        lineEl.textContent = 'Could not load concept cards right now.';
        themeEl.textContent = 'Theme · retry';
        console.error(error);
      }
    }

    mediaImageEl.addEventListener('error', () => {
      mediaFrameEl.hidden = true;
    });

    controls.forEach((button) => {
      const step = Number(button.dataset.step) || 1;
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        move(step);
      });
    });

    shuffleButton.addEventListener('click', (event) => {
      event.stopPropagation();
      shuffle();
    });

    document.body.addEventListener('click', (event) => {
      if (event.target.closest('button, a')) return;
      move(1);
    });

    document.addEventListener('keydown', (event) => {
      if (['ArrowRight', 'ArrowDown', ' ', 'Enter'].includes(event.key)) {
        event.preventDefault();
        move(1);
      }
      if (['ArrowLeft', 'ArrowUp'].includes(event.key)) {
        event.preventDefault();
        move(-1);
      }
    });

    loadConcepts();
  </script>
</body>
</html>
