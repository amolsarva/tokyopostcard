<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEWAIYORK · Second Chapters at Sunrise</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Space Grotesk", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --bg: #09090d;
      --ink: #f8fbff;
      --ink-soft: rgba(248, 251, 255, 0.78);
      --accent: #98d7ff;
      --hero-background: radial-gradient(circle at 22% -5%, rgba(152, 215, 255, 0.42), transparent 52%), linear-gradient(140deg, #161924 0%, #1f3152 48%, #0e1018 100%);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--hero-background);
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      background-image: var(--photo, radial-gradient(circle at 22% -5%, rgba(152, 215, 255, 0.42), transparent 52%), linear-gradient(140deg, #161924 0%, #1f3152 48%, #0e1018 100%));
      background-size: cover;
      background-position: center;
      filter: saturate(1.05) contrast(1.05);
    }

    body::after {
      background: radial-gradient(circle at 25% 20%, rgba(0, 0, 0, 0.45), transparent 45%), linear-gradient(145deg, rgba(5, 6, 12, 0.8), rgba(3, 2, 8, 0.55));
    }

    .hud {
      position: fixed;
      top: 1rem;
      left: clamp(1rem, 4vw, 2.5rem);
      right: clamp(1rem, 4vw, 2.5rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      z-index: 4;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.72rem;
      z-index: 1;
    }

    .hud a {
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      padding-bottom: 2px;
    }

    .hud-metric {
      color: var(--ink-soft);
      font-size: 0.68rem;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 14vh clamp(1rem, 5vw, 4rem) 3rem;
      position: relative;
      z-index: 1;
    }

    .card {
      width: min(980px, 100%);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(5, 6, 12, 0.52);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.52);
      padding: clamp(1.2rem, 4vw, 2.8rem);
      display: grid;
      gap: 0.85rem;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: clamp(1.35rem, 4.4vw, 2.8rem);
      color: var(--accent);
    }

    .theme {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.7rem;
      color: var(--ink-soft);
    }

    .line {
      margin: 0;
      font-size: clamp(1.15rem, 2.8vw, 2rem);
      line-height: 1.42;
      max-width: 34ch;
      quotes: "“" "”";
    }

    .line::before { content: open-quote; }
    .line::after { content: close-quote; }

    .attribution {
      margin: 0;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      color: rgba(248, 251, 255, 0.86);
      text-transform: uppercase;
    }

    .source {
      margin: 0;
      font-size: 0.8rem;
      color: rgba(248, 251, 255, 0.64);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .media-frame {
      margin: 0;
      padding: 0.4rem 0;
      display: flex;
    }

    .slot-pill {
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      text-transform: uppercase;
      color: rgba(248, 251, 255, 0.8);
      background: rgba(0, 0, 0, 0.35);
      margin: 0 auto;
    }

    .slot-pill[hidden] {
      display: none;
    }

    .keywords {
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0;
      list-style: none;
    }

    .keywords li {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(0, 0, 0, 0.25);
      padding: 0.35rem 0.75rem;
      font-size: 0.74rem;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 0.3rem;
    }

    .controls button {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.56rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.68rem;
      cursor: pointer;
    }

    .hint {
      margin: 0;
      font-size: 0.72rem;
      color: rgba(248, 251, 255, 0.62);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
  <script src="/assets/js/password-gate.js"></script>
</head>
<body data-edition="./second-chapters-framework.json" data-media-base="./assets">
  <header class="hud">
    <a href="../../">NewAIYork</a>
    <span class="hud-metric"><span id="index">01</span> / <span id="total">00</span></span>
    <a href="../../archive.html">Laurarchive</a>
  </header>

  <main>
    <section class="card" aria-live="polite">
      <h1 id="title">Second Chapters at Sunrise</h1>
      <p class="theme" id="theme">Loading...</p>
      <p class="line" id="line">Loading quote framework...</p>
      <p class="attribution" id="attribution"></p>
      <p class="source" id="source"></p>
      <figure class="media-frame">
        <figcaption class="slot-pill" id="slotPill">Awaiting image slot</figcaption>
      </figure>
      <ul class="keywords" id="keywords"></ul>
      <div class="controls">
        <button type="button" data-step="-1">Prev</button>
        <button type="button" data-step="1">Next</button>
        <button type="button" id="shuffle">Shuffle</button>
      </div>
      <p class="hint">Framework mode: slots auto-show until your 15 images are added.</p>
    </section>
  </main>

  <script>
    const titleEl = document.getElementById('title');
    const themeEl = document.getElementById('theme');
    const lineEl = document.getElementById('line');
    const attributionEl = document.getElementById('attribution');
    const sourceEl = document.getElementById('source');
    const keywordsEl = document.getElementById('keywords');
    const slotPillEl = document.getElementById('slotPill');
    const indexEl = document.getElementById('index');
    const totalEl = document.getElementById('total');
    const controls = document.querySelectorAll('[data-step]');
    const shuffleButton = document.getElementById('shuffle');
    const root = document.documentElement;
    const mediaBase = (document.body.dataset.mediaBase || './assets').replace(/\/$/, '');
    const mediaBase = (document.body.dataset.mediaBase || './assets').replace(/\/$/, '');

    let concepts = [];
    let current = 0;

    const fmt = (value, fallback) => (typeof value === 'string' && value.trim() ? value.trim() : fallback);

    const render = () => {
      if (!concepts.length) return;
      const concept = concepts[current];
      titleEl.textContent = fmt(concept.title, 'Untitled');
      themeEl.textContent = `${fmt(concept.theme, 'concept')} · ${fmt(concept.domain, 'source')}`;
      lineEl.textContent = fmt(concept.quote || concept.line, '');
      attributionEl.textContent = `— ${fmt(concept.attribution, 'Unknown')}`;
      sourceEl.textContent = fmt(concept.source, 'Source TBD');

      root.style.setProperty('--accent', concept.color || '#98d7ff');
      root.style.setProperty('--hero-background', concept.background || 'radial-gradient(circle at 20% 0%, rgba(152, 215, 255, 0.42), transparent 52%), linear-gradient(140deg, #161924 0%, #1f3152 48%, #0e1018 100%)');

      const ref = typeof concept.image === 'string' ? concept.image.trim() : '';
      if (ref) {
        const src = ref.startsWith('/') ? ref : `${mediaBase}/${ref}`;
        root.style.setProperty('--photo', `url('${src}')`);
        slotPillEl.hidden = true;
      } else {
        root.style.setProperty('--photo', 'radial-gradient(circle at 20% 0%, rgba(152, 215, 255, 0.42), transparent 52%), linear-gradient(140deg, #161924 0%, #1f3152 48%, #0e1018 100%)');
        slotPillEl.hidden = false;
        slotPillEl.textContent = `Image Slot ${String(concept.imageSlot || current + 1).padStart(2, '0')}`;
      }

      keywordsEl.innerHTML = '';
      (concept.keywords || []).forEach((keyword) => {
        const li = document.createElement('li');
        li.textContent = keyword;
        keywordsEl.appendChild(li);
      });

      indexEl.textContent = String(current + 1).padStart(2, '0');
      totalEl.textContent = String(concepts.length).padStart(2, '0');
    };

    const step = (delta) => {
      if (!concepts.length) return;
      current = (current + delta + concepts.length) % concepts.length;
      render();
    };

    const shuffle = () => {
      if (!concepts.length) return;
      current = Math.floor(Math.random() * concepts.length);
      render();
    };

    controls.forEach((button) => {
      button.addEventListener('click', () => step(Number(button.dataset.step)));
    });

    shuffleButton.addEventListener('click', shuffle);

    document.body.addEventListener('click', (event) => {
      if (event.target.closest('button, a')) return;
      step(1);
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === 'ArrowDown') {
        event.preventDefault();
        step(1);
      }
      if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') {
        event.preventDefault();
        step(-1);
      }
    });

    const load = async () => {
      const path = document.body.dataset.edition;
      try {
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed to load edition data');
        const payload = await response.json();
        if (!Array.isArray(payload) || !payload.length) throw new Error('Edition payload is empty');
        concepts = payload;
        render();
      } catch (error) {
        titleEl.textContent = 'Second Chapters at Sunrise';
        themeEl.textContent = 'Edition unavailable';
        lineEl.textContent = 'Could not load framework data.';
        attributionEl.textContent = '';
        sourceEl.textContent = '';
        slotPillEl.textContent = 'Data load error';
        console.error(error);
      }
    };

    load();
  </script>
</body>
</html>
