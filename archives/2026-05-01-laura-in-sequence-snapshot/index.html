<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEWAIYORK · Laura in Sequence</title>
  <meta name="description" content="An 85-still ordered Laura sequence built from the April 30 image batch." />
  <link rel="canonical" href="/archives/2026-05-01-laura-in-sequence-snapshot/" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23050506'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Arial' font-size='24' fill='%23d6b56d'%3EL%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050506;
      --ink: #f7f3ed;
      --ink-soft: rgba(247, 243, 237, 0.72);
      --line: rgba(247, 243, 237, 0.24);
      --accent: #f04d4d;
      --gold: #d6b56d;
      --veil: rgba(5, 5, 6, 0.72);
      font-family: "Inter", "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    img { display: block; }

    .shell {
      position: relative;
      height: 100vh;
      height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at 18% 14%, rgba(214, 181, 109, 0.16), transparent 32%),
        linear-gradient(180deg, #11110f 0%, #050506 52%, #030303 100%);
    }

    .hud,
    .footer {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: clamp(0.85rem, 2vw, 1.3rem) clamp(1rem, 3vw, 2rem);
      background: linear-gradient(180deg, rgba(5, 5, 6, 0.88), rgba(5, 5, 6, 0.46));
      backdrop-filter: blur(18px);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.66rem;
    }

    .footer {
      position: relative;
      min-height: 82px;
      display: block;
      background: linear-gradient(0deg, rgba(5, 5, 6, 0.94), rgba(5, 5, 6, 0.64));
      border-top: 1px solid rgba(247, 243, 237, 0.14);
    }

    .brand {
      letter-spacing: 0.34em;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .hud a,
    .footer a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(247, 243, 237, 0.34);
      padding-bottom: 0.12rem;
    }

    .stage {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      overflow: hidden;
      background: #000;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.48), transparent 22%, transparent 72%, rgba(0, 0, 0, 0.52)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.36), transparent 28%, transparent 72%, rgba(0, 0, 0, 0.36));
      pointer-events: none;
    }

    .frame-wrap {
      position: relative;
      z-index: 0;
      width: min(80vw, calc(80vh * 640 / 416));
      aspect-ratio: 640 / 416;
      max-width: calc(100vw - 2rem);
      max-height: calc(100vh - 11rem);
      box-shadow: 0 34px 110px rgba(0, 0, 0, 0.76);
    }

    .frame {
      position: relative;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }


    .frame {
      display: grid;
      place-items: center;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: #000;
    }

    .frame-label {
      position: absolute;
      right: 0.75rem;
      top: 0.75rem;
      display: inline-flex;
      gap: 0.55rem;
      align-items: center;
      padding: 0.45rem 0.7rem;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(247, 243, 237, 0.24);
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.62rem;
    }

    .frame-label strong {
      color: var(--gold);
      font-weight: 700;
    }

    .caption {
      display: none;
    }

    .story-card {
      position: absolute;
      z-index: 3;
      top: clamp(4.7rem, 8vw, 6.2rem);
      left: clamp(1rem, 3vw, 2rem);
      max-width: min(390px, calc(100vw - 2rem));
      display: grid;
      gap: 0.55rem;
      padding: clamp(0.85rem, 2vw, 1.15rem);
      background: var(--veil);
      border: 1px solid rgba(247, 243, 237, 0.18);
      backdrop-filter: blur(18px);
      pointer-events: none;
    }

    .story-card p,
    .story-card h1 {
      margin: 0;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.78);
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 0.65rem;
      color: var(--gold);
    }

    h1 {
      font-size: clamp(1.15rem, 2.8vw, 2rem);
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .story-copy {
      color: rgba(247, 243, 237, 0.78);
      line-height: 1.5;
      font-size: clamp(0.82rem, 1.2vw, 0.95rem);
    }

    .story-meta {
      color: rgba(247, 243, 237, 0.66);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.58rem;
    }

    .controls {
      position: absolute;
      z-index: 4;
      right: clamp(1rem, 3vw, 2rem);
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      gap: 0.65rem;
    }

    button {
      appearance: none;
      border: 1px solid rgba(247, 243, 237, 0.3);
      background: rgba(5, 5, 6, 0.68);
      color: var(--ink);
      cursor: pointer;
      backdrop-filter: blur(16px);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    button:hover,
    button:focus-visible {
      border-color: rgba(247, 243, 237, 0.78);
      background: rgba(5, 5, 6, 0.86);
      transform: translateY(-1px);
      outline: none;
    }

    .icon-button {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 1.35rem;
      line-height: 1;
    }

    .thumb-strip {
      position: absolute;
      left: clamp(1rem, 3vw, 2rem);
      right: clamp(1rem, 3vw, 2rem);
      bottom: 2.65rem;
      z-index: 5;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: thin;
      padding: 0.2rem 0;
    }

    .thumb {
      flex: 0 0 auto;
      width: 72px;
      aspect-ratio: 640 / 416;
      border-radius: 4px;
      border: 1px solid rgba(247, 243, 237, 0.18);
      padding: 0;
      overflow: hidden;
      opacity: 0.5;
      background: #000;
    }

    .thumb[aria-current="true"] {
      opacity: 1;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(240, 77, 77, 0.45);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .progress {
      position: absolute;
      z-index: 5;
      right: clamp(1rem, 3vw, 2rem);
      bottom: 0.95rem;
      width: min(360px, 34vw);
      flex: 0 0 auto;
      display: grid;
      gap: 0.42rem;
      color: var(--ink-soft);
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }

    .bar {
      position: relative;
      height: 2px;
      background: rgba(247, 243, 237, 0.2);
      overflow: hidden;
    }

    .bar span {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--progress, 1%);
      background: var(--accent);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 760px) {
      .hud,
      .footer {
        align-items: flex-start;
        flex-direction: column;
        letter-spacing: 0.16em;
      }

      .stage {
        min-height: 0;
      }

      .frame-wrap {
        width: min(92vw, calc(62vh * 640 / 416));
        max-height: 62vh;
      }

      .story-card {
        top: 5.7rem;
        max-width: calc(100vw - 2rem);
      }

      .controls {
        top: auto;
        right: 1rem;
        bottom: 1rem;
        transform: none;
        grid-template-columns: repeat(2, 1fr);
      }

      .icon-button {
        width: 46px;
        height: 46px;
      }

      .progress {
        position: absolute;
        top: auto;
        right: 1rem;
        left: 1rem;
        bottom: 0.8rem;
        width: 100%;
        max-width: calc(100% - 2rem);
      }

      .thumb {
        width: 62px;
      }

      .thumb-strip {
        left: 1rem;
        right: 1rem;
        bottom: 3.3rem;
      }

      .frame-label {
        top: 0.5rem;
        right: 0.5rem;
      }

      .caption {
        bottom: 0.75rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="hud" aria-label="Primary">
      <div class="brand">NEWAIYORK</div>
      <div class="nav">
        <a href="../../archive.html">Laurarchive</a>
        <a href="../../blog.html">Werkwelt</a>
        <a href="../2026-04-30-always-everything-draft/">Previous edition</a>
      </div>
    </nav>

    <main class="stage" id="stage">
      <section class="story-card" aria-labelledby="edition-title">
        <p class="eyebrow" id="storyEyebrow">April 30 · Ordered Stills</p>
        <h1 id="edition-title">Laura in Sequence</h1>
        <p class="story-copy" id="storyCopy">A relationship story told through Laura's pauses, exits, negotiations, and final authorship.</p>
        <p class="story-meta" id="storyMeta">Frame 01 · Prologue</p>
      </section>

      <div class="frame-wrap">
        <figure class="frame">
          <img id="activeImage" src="../../assets/editions/2026-04-30-always-everything/images/scene-01.jpg" alt="Laura in Sequence still 1 of 85" />
          <figcaption class="frame-label"><strong id="activeNumber">01</strong><span id="activeTotal">of 85</span></figcaption>
        </figure>
        <p class="caption" id="activeCaption">Opening distance</p>
      </div>

      <div class="controls" aria-label="Sequence controls">
        <button class="icon-button" type="button" id="prevButton" aria-label="Previous still">‹</button>
        <button class="icon-button" type="button" id="nextButton" aria-label="Next still">›</button>
      </div>
    </main>

    <footer class="footer">
      <div class="progress" aria-label="Progress">
        <div class="progress-row">
          <span id="progressLabel">01 / 85</span>
          <span>Laura cut</span>
        </div>
        <div class="bar" aria-hidden="true"><span id="progressBar"></span></div>
      </div>
      <div class="thumb-strip" id="thumbStrip" aria-label="Still thumbnails"></div>
    </footer>
  </div>

  <script>
    const totalFrames = 85;
    const assetBase = '../../assets/editions/2026-04-30-always-everything/images/';
    const stage = document.getElementById('stage');
    const activeImage = document.getElementById('activeImage');
    const activeNumber = document.getElementById('activeNumber');
    const activeTotal = document.getElementById('activeTotal');
    const activeCaption = document.getElementById('activeCaption');
    const storyEyebrow = document.getElementById('storyEyebrow');
    const storyCopy = document.getElementById('storyCopy');
    const storyMeta = document.getElementById('storyMeta');
    const progressLabel = document.getElementById('progressLabel');
    const progressBar = document.getElementById('progressBar');
    const thumbStrip = document.getElementById('thumbStrip');
    const prevButton = document.getElementById('prevButton');
    const nextButton = document.getElementById('nextButton');
    const storyBeats = [
      {
        start: 1,
        end: 10,
        title: 'Opening Distance',
        eyebrow: 'Act I · The room before the argument',
        copy: 'Laura is introduced through hesitation: she stays, resists, and measures the emotional temperature before anyone names the break.',
        caption: 'The story begins with withheld permission.'
      },
      {
        start: 11,
        end: 22,
        title: 'Terms of the Break',
        eyebrow: 'Act I · Negotiation',
        copy: 'The apartment scenes turn intimacy into logistics. Every line feels practical, but the real subject is whether either person can still be changed.',
        caption: 'Love becomes a conversation about boundaries.'
      },
      {
        start: 23,
        end: 36,
        title: 'The Other Version',
        eyebrow: 'Act II · Projection',
        copy: 'Rob keeps turning Laura into a story he can manage: taste, jobs, toughness, music, the fantasy of a version that would hurt less.',
        caption: 'He edits her while she keeps becoming herself.'
      },
      {
        start: 37,
        end: 52,
        title: 'Cross-Examination',
        eyebrow: 'Act II · Reversal',
        copy: 'The sequence becomes less about winning Laura back and more about revealing the self-absorption underneath the wanting.',
        caption: 'The argument exposes the narrator.'
      },
      {
        start: 53,
        end: 69,
        title: 'Laura Speaks Back',
        eyebrow: 'Act III · Counterpoint',
        copy: 'She stops functioning as an absence and becomes an answering intelligence: funny, tired, precise, and not reducible to his heartbreak.',
        caption: 'The beloved becomes a person again.'
      },
      {
        start: 70,
        end: 85,
        title: 'Authorship',
        eyebrow: 'Coda · The name remains',
        copy: 'The final movement turns from romance to authorship. Laura is not just the subject of memory; she is the maker whose name survives the scene.',
        caption: 'The ending signs itself with Laura.'
      }
    ];

    function storyForFrame(frameNumber) {
      return storyBeats.find((beat) => frameNumber >= beat.start && frameNumber <= beat.end) || storyBeats[0];
    }

    const frames = Array.from({ length: totalFrames }, (_, index) => {
      const number = String(index + 1).padStart(2, '0');
      const beat = storyForFrame(index + 1);
      return {
        number,
        src: `${assetBase}scene-${number}.jpg`,
        alt: `Laura in Sequence still ${index + 1} of ${totalFrames}`,
        beat
      };
    });
    let activeIndex = 0;

    function setFrame(index) {
      activeIndex = (index + totalFrames) % totalFrames;
      const frame = frames[activeIndex];
      activeImage.src = frame.src;
      activeImage.alt = frame.alt;
      activeNumber.textContent = frame.number;
      activeTotal.textContent = `of ${totalFrames}`;
      activeCaption.textContent = frame.beat.caption;
      document.getElementById('edition-title').textContent = frame.beat.title;
      storyEyebrow.textContent = frame.beat.eyebrow;
      storyCopy.textContent = frame.beat.copy;
      storyMeta.textContent = `Frames ${String(frame.beat.start).padStart(2, '0')}-${String(frame.beat.end).padStart(2, '0')} · current ${frame.number}`;
      progressLabel.textContent = `${frame.number} / ${totalFrames}`;
      progressBar.style.setProperty('--progress', `${((activeIndex + 1) / totalFrames) * 100}%`);
      stage.style.setProperty('--active-image', `url("${frame.src}")`);
      thumbStrip.querySelectorAll('.thumb').forEach((button, buttonIndex) => {
        const isActive = buttonIndex === activeIndex;
        button.setAttribute('aria-current', isActive ? 'true' : 'false');
        if (isActive) button.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
      });
    }

    function buildThumbs() {
      const fragment = document.createDocumentFragment();
      frames.forEach((frame, index) => {
        const button = document.createElement('button');
        button.className = 'thumb';
        button.type = 'button';
        button.setAttribute('aria-label', `Show still ${index + 1}`);
        const image = document.createElement('img');
        image.src = frame.src;
        image.alt = '';
        image.loading = index < 12 ? 'eager' : 'lazy';
        button.appendChild(image);
        button.addEventListener('click', () => setFrame(index));
        fragment.appendChild(button);
      });
      thumbStrip.appendChild(fragment);
    }

    prevButton.addEventListener('click', () => setFrame(activeIndex - 1));
    nextButton.addEventListener('click', () => setFrame(activeIndex + 1));
    stage.addEventListener('click', (event) => {
      if (event.target.closest('button, a')) return;
      setFrame(activeIndex + 1);
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') setFrame(activeIndex - 1);
      if (event.key === 'ArrowRight') setFrame(activeIndex + 1);
    });

    buildThumbs();
    setFrame(0);
  </script>
</body>
</html>
