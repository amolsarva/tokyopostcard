<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEWAIYORK · DREAMS</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "SF Pro Display", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --bg: #120318;
      --ink: #fff8f5;
      --accent: #ff7ab7;
      --panel: rgba(0, 0, 0, 0.42);
      --hero-background: radial-gradient(circle at 20% -10%, rgba(255, 198, 235, 0.4), transparent 50%), linear-gradient(155deg, #2a1233 0%, #632960 45%, #14122f 100%);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hud {
      position: fixed;
      top: 1.2rem;
      left: clamp(1rem, 5vw, 3rem);
      right: clamp(1rem, 5vw, 3rem);
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand-link,
    .archives-link {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      padding-bottom: 2px;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 14vh clamp(1rem, 5vw, 4rem) 4rem;
      background: var(--hero-background);
    }

    .stage {
      width: min(980px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(5px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
      padding: clamp(1.4rem, 3.5vw, 3rem);
      display: grid;
      gap: 1.2rem;
    }

    h1 {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: clamp(1.7rem, 7vw, 4.2rem);
      color: var(--accent);
    }

    .line {
      margin: 0;
      min-height: 5.4rem;
      font-size: clamp(1.25rem, 4vw, 2.3rem);
      line-height: 1.35;
      max-width: 28ch;
    }

    .emoji-band {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4rem);
      letter-spacing: 0.18em;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.3));
      user-select: none;
    }

    .meta {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      opacity: 0.8;
    }

    .controls {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .controls button {
      border: 1px solid rgba(255, 255, 255, 0.36);
      background: rgba(0, 0, 0, 0.35);
      color: inherit;
      border-radius: 999px;
      padding: 0.6rem 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.68rem;
      cursor: pointer;
    }

    footer {
      padding: 1rem;
      text-align: center;
      background: #060308;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.68rem;
    }
  </style>
</head>
<body data-cycles="../../assets/data/dreams.json">
  <header class="hud">
    <a class="brand-link" href="../../">NEWAIYORK</a>
    <span><span id="counter">01</span> / <span id="total">00</span></span>
    <span id="tone">DREAM MAP</span>
  </header>

  <main>
    <section class="stage" aria-live="polite">
      <h1 id="title">DREAMS</h1>
      <p class="line" id="line">Loading...</p>
      <p class="emoji-band" id="emoji">✨</p>
      <p class="meta" id="meta">Tap anywhere for next line</p>
      <div class="controls" aria-label="Page controls">
        <button type="button" data-cycle="-1">Prev</button>
        <button type="button" data-cycle="1">Next</button>
      </div>
    </section>
  </main>

  <footer>
    <a class="archives-link" href="../../archive.html">LAURARCHIVE</a>
  </footer>

  <script>
    const root = document.documentElement;
    const counterEl = document.getElementById('counter');
    const totalEl = document.getElementById('total');
    const toneEl = document.getElementById('tone');
    const lineEl = document.getElementById('line');
    const emojiEl = document.getElementById('emoji');
    const metaEl = document.getElementById('meta');
    const controls = document.querySelectorAll('[data-cycle]');

    let scenes = [];
    let index = 0;

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function renderScene(scene) {
      if (!scene) return;
      lineEl.textContent = scene.line || '';
      emojiEl.textContent = scene.emoji || '✨';
      metaEl.textContent = scene.meta || 'Tap anywhere for next line';
      toneEl.textContent = scene.tone || 'DREAM MAP';
      counterEl.textContent = pad(index + 1);
      totalEl.textContent = pad(scenes.length);
      root.style.setProperty('--accent', scene.accent || '#ff7ab7');
      root.style.setProperty('--hero-background', scene.background || 'linear-gradient(135deg, #291734 0%, #12122f 100%)');
    }

    function move(direction = 1) {
      if (!scenes.length) return;
      index = (index + direction + scenes.length) % scenes.length;
      renderScene(scenes[index]);
    }

    controls.forEach((button) => {
      const direction = Number(button.dataset.cycle) || 1;
      button.addEventListener('click', (event) => {
        event.preventDefault();
        move(direction);
      });
    });

    document.body.addEventListener('click', (event) => {
      if (event.target.closest('button, a')) return;
      move(1);
    });

    document.addEventListener('keydown', (event) => {
      if (['ArrowRight', 'ArrowDown', ' ', 'Enter'].includes(event.key)) {
        event.preventDefault();
        move(1);
      }
      if (['ArrowLeft', 'ArrowUp'].includes(event.key)) {
        event.preventDefault();
        move(-1);
      }
    });

    async function loadScenes() {
      try {
        const path = document.body.dataset.cycles;
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) throw new Error('could not load dreams data');
        scenes = await response.json();
        totalEl.textContent = pad(scenes.length);
        renderScene(scenes[index]);
      } catch (error) {
        lineEl.textContent = 'Could not load this edition right now.';
        metaEl.textContent = 'Refresh to retry';
        console.error(error);
      }
    }

    loadScenes();
  </script>
</body>
</html>
