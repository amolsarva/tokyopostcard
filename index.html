<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEWAIYORK · Laura in Sequence</title>
  <meta name="description" content="An 85-still ordered Laura sequence built from the April 30 image batch." />
  <link rel="canonical" href="./" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050506;
      --ink: #f7f3ed;
      --ink-soft: rgba(247, 243, 237, 0.72);
      --line: rgba(247, 243, 237, 0.24);
      --panel: rgba(5, 5, 6, 0.72);
      --accent: #f04d4d;
      --gold: #d6b56d;
      font-family: "Inter", "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    img { display: block; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at 18% 14%, rgba(214, 181, 109, 0.16), transparent 32%),
        linear-gradient(180deg, #11110f 0%, #050506 52%, #030303 100%);
    }

    .hud,
    .footer {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: clamp(0.85rem, 2vw, 1.3rem) clamp(1rem, 3vw, 2rem);
      background: linear-gradient(180deg, rgba(5, 5, 6, 0.88), rgba(5, 5, 6, 0.46));
      backdrop-filter: blur(18px);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.66rem;
    }

    .footer {
      background: linear-gradient(0deg, rgba(5, 5, 6, 0.9), rgba(5, 5, 6, 0.42));
      border-top: 1px solid rgba(247, 243, 237, 0.14);
    }

    .brand {
      letter-spacing: 0.34em;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .hud a,
    .footer a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(247, 243, 237, 0.34);
      padding-bottom: 0.12rem;
    }

    .stage {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      place-items: center;
      padding: clamp(0.8rem, 2vw, 1.6rem);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: var(--active-image);
      background-size: cover;
      background-position: center;
      filter: blur(32px) saturate(0.9) brightness(0.42);
      transform: scale(1.12);
      opacity: 0.74;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.58), transparent 28%, transparent 72%, rgba(0, 0, 0, 0.58)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent 18%, transparent 72%, rgba(0, 0, 0, 0.55));
      pointer-events: none;
    }

    .frame-wrap {
      position: relative;
      z-index: 2;
      width: min(1180px, 100%);
      display: grid;
      gap: 0.85rem;
    }

    .frame {
      position: relative;
      width: 100%;
      aspect-ratio: 640 / 416;
      background: #000;
      border: 1px solid rgba(247, 243, 237, 0.22);
      box-shadow: 0 38px 120px rgba(0, 0, 0, 0.72);
      overflow: hidden;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .frame-label {
      position: absolute;
      left: clamp(0.8rem, 2vw, 1.4rem);
      bottom: clamp(0.8rem, 2vw, 1.4rem);
      display: inline-flex;
      gap: 0.55rem;
      align-items: center;
      padding: 0.45rem 0.7rem;
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(247, 243, 237, 0.24);
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.62rem;
    }

    .frame-label strong {
      color: var(--gold);
      font-weight: 700;
    }

    .caption {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.5;
      letter-spacing: 0.03em;
      font-size: clamp(0.86rem, 1.2vw, 1rem);
    }

    .title-block {
      position: absolute;
      z-index: 3;
      top: clamp(4.7rem, 8vw, 6.4rem);
      left: clamp(1rem, 3vw, 2rem);
      max-width: min(430px, calc(100vw - 2rem));
      display: grid;
      gap: 0.45rem;
      pointer-events: none;
    }

    .title-block p,
    .title-block h1 {
      margin: 0;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.78);
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 0.65rem;
      color: var(--gold);
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 4.3rem);
      line-height: 0.92;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .deck {
      color: rgba(247, 243, 237, 0.78);
      line-height: 1.45;
      font-size: clamp(0.9rem, 1.4vw, 1.05rem);
    }

    .controls {
      position: absolute;
      z-index: 4;
      right: clamp(1rem, 3vw, 2rem);
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      gap: 0.65rem;
    }

    button {
      appearance: none;
      border: 1px solid rgba(247, 243, 237, 0.3);
      background: rgba(5, 5, 6, 0.68);
      color: var(--ink);
      cursor: pointer;
      backdrop-filter: blur(16px);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    button:hover,
    button:focus-visible {
      border-color: rgba(247, 243, 237, 0.78);
      background: rgba(5, 5, 6, 0.86);
      transform: translateY(-1px);
      outline: none;
    }

    .icon-button {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 1.35rem;
      line-height: 1;
    }

    .thumb-strip {
      z-index: 5;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: thin;
      padding: 0.2rem 0;
    }

    .thumb {
      flex: 0 0 auto;
      width: 72px;
      aspect-ratio: 640 / 416;
      border-radius: 4px;
      border: 1px solid rgba(247, 243, 237, 0.18);
      padding: 0;
      overflow: hidden;
      opacity: 0.5;
      background: #000;
    }

    .thumb[aria-current="true"] {
      opacity: 1;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(240, 77, 77, 0.45);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .progress {
      flex: 0 0 min(360px, 34vw);
      display: grid;
      gap: 0.42rem;
      color: var(--ink-soft);
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }

    .bar {
      position: relative;
      height: 2px;
      background: rgba(247, 243, 237, 0.2);
      overflow: hidden;
    }

    .bar span {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--progress, 1%);
      background: var(--accent);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 760px) {
      body { overflow: auto; }

      .shell {
        min-height: 100svh;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .hud,
      .footer {
        align-items: flex-start;
        flex-direction: column;
        letter-spacing: 0.16em;
      }

      .stage {
        min-height: 64svh;
        padding-top: 8.5rem;
      }

      .title-block {
        top: 6.4rem;
      }

      .controls {
        top: auto;
        right: 1rem;
        bottom: 1rem;
        transform: none;
        grid-template-columns: repeat(2, 1fr);
      }

      .icon-button {
        width: 46px;
        height: 46px;
      }

      .progress {
        width: 100%;
        flex: none;
      }

      .thumb {
        width: 62px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="hud" aria-label="Primary">
      <div class="brand">NEWAIYORK</div>
      <div class="nav">
        <a href="./archive.html">Laurarchive</a>
        <a href="./blog.html">Werkwelt</a>
        <a href="./archives/2026-04-30-always-everything-draft/">Previous edition</a>
      </div>
    </nav>

    <main class="stage" id="stage">
      <section class="title-block" aria-labelledby="edition-title">
        <p class="eyebrow">April 30 · Ordered Stills</p>
        <h1 id="edition-title">Laura in Sequence</h1>
        <p class="deck">Eighty-five frames, kept in the order they arrived.</p>
      </section>

      <div class="frame-wrap">
        <figure class="frame">
          <img id="activeImage" src="./assets/editions/2026-04-30-always-everything/images/scene-01.jpg" alt="Laura in Sequence still 1 of 85" />
          <figcaption class="frame-label"><strong id="activeNumber">01</strong><span id="activeTotal">of 85</span></figcaption>
        </figure>
        <p class="caption" id="activeCaption">Screenshot 01 · 2026-04-30</p>
      </div>

      <div class="controls" aria-label="Sequence controls">
        <button class="icon-button" type="button" id="prevButton" aria-label="Previous still">‹</button>
        <button class="icon-button" type="button" id="nextButton" aria-label="Next still">›</button>
      </div>
    </main>

    <footer class="footer">
      <div class="progress" aria-label="Progress">
        <div class="progress-row">
          <span id="progressLabel">01 / 85</span>
          <span>Laura cut</span>
        </div>
        <div class="bar" aria-hidden="true"><span id="progressBar"></span></div>
      </div>
      <div class="thumb-strip" id="thumbStrip" aria-label="Still thumbnails"></div>
    </footer>
  </div>

  <script>
    const totalFrames = 85;
    const assetBase = './assets/editions/2026-04-30-always-everything/images/';
    const stage = document.getElementById('stage');
    const activeImage = document.getElementById('activeImage');
    const activeNumber = document.getElementById('activeNumber');
    const activeTotal = document.getElementById('activeTotal');
    const activeCaption = document.getElementById('activeCaption');
    const progressLabel = document.getElementById('progressLabel');
    const progressBar = document.getElementById('progressBar');
    const thumbStrip = document.getElementById('thumbStrip');
    const prevButton = document.getElementById('prevButton');
    const nextButton = document.getElementById('nextButton');
    const frames = Array.from({ length: totalFrames }, (_, index) => {
      const number = String(index + 1).padStart(2, '0');
      return {
        number,
        src: `${assetBase}scene-${number}.jpg`,
        alt: `Laura in Sequence still ${index + 1} of ${totalFrames}`
      };
    });
    let activeIndex = 0;

    function setFrame(index) {
      activeIndex = (index + totalFrames) % totalFrames;
      const frame = frames[activeIndex];
      activeImage.src = frame.src;
      activeImage.alt = frame.alt;
      activeNumber.textContent = frame.number;
      activeTotal.textContent = `of ${totalFrames}`;
      activeCaption.textContent = `Screenshot ${frame.number} · 2026-04-30`;
      progressLabel.textContent = `${frame.number} / ${totalFrames}`;
      progressBar.style.setProperty('--progress', `${((activeIndex + 1) / totalFrames) * 100}%`);
      stage.style.setProperty('--active-image', `url("${frame.src}")`);
      thumbStrip.querySelectorAll('.thumb').forEach((button, buttonIndex) => {
        const isActive = buttonIndex === activeIndex;
        button.setAttribute('aria-current', isActive ? 'true' : 'false');
        if (isActive) button.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
      });
    }

    function buildThumbs() {
      const fragment = document.createDocumentFragment();
      frames.forEach((frame, index) => {
        const button = document.createElement('button');
        button.className = 'thumb';
        button.type = 'button';
        button.setAttribute('aria-label', `Show still ${index + 1}`);
        const image = document.createElement('img');
        image.src = frame.src;
        image.alt = '';
        image.loading = index < 12 ? 'eager' : 'lazy';
        button.appendChild(image);
        button.addEventListener('click', () => setFrame(index));
        fragment.appendChild(button);
      });
      thumbStrip.appendChild(fragment);
    }

    prevButton.addEventListener('click', () => setFrame(activeIndex - 1));
    nextButton.addEventListener('click', () => setFrame(activeIndex + 1));
    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') setFrame(activeIndex - 1);
      if (event.key === 'ArrowRight') setFrame(activeIndex + 1);
    });

    buildThumbs();
    setFrame(0);
  </script>
</body>
</html>
