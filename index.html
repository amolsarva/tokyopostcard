<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEWAIYORK · New London Home</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Inter", "Space Grotesk", -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      --ink: #f9f1e6;
      --ink-soft: rgba(249, 241, 230, 0.7);
      --shadow: rgba(10, 7, 5, 0.85);
      --accent: #c47a3a;
      --bg: #140c07;
      --grain: rgba(13, 9, 6, 0.6);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .stage {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(140deg, rgba(14, 9, 5, 0.88) 0%, rgba(14, 9, 5, 0.62) 48%, rgba(20, 12, 7, 0.82) 100%),
        var(--photo, radial-gradient(circle at 35% 25%, #c47a3a, #1b1008 65%));
      background-size: cover;
      background-position: center;
      transition: background-image 220ms ease-out;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(1rem, 3.5vw, 2.4rem);
      padding-bottom: clamp(3rem, 8vw, 5rem);
      z-index: 3;
    }

    .topline,
    .bottomline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.68rem;
      color: var(--ink-soft);
      text-shadow: 0 2px 20px var(--shadow);
    }

    .topline a,
    .bottomline a {
      pointer-events: auto;
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(244, 239, 233, 0.5);
      padding-bottom: 2px;
    }

    .nav-links {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .bottomline {
        align-items: flex-start;
      }

      .nav-links {
        justify-content: flex-start;
      }
    }

    .copy {
      max-width: min(78ch, 92vw);
      margin: auto 0;
      pointer-events: none;
      text-shadow: 0 12px 34px var(--shadow);
    }

    .kicker {
      margin: 0 0 0.7rem;
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 5.8rem);
      line-height: 0.98;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      max-width: 13ch;
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.86;
    }

    .controls {
      position: fixed;
      right: clamp(1rem, 3vw, 2rem);
      bottom: clamp(1rem, 3vw, 2rem);
      z-index: 4;
      display: flex;
      gap: 0.5rem;
    }

    .controls button {
      pointer-events: auto;
      border: 1px solid rgba(244, 239, 233, 0.5);
      background: rgba(12, 16, 23, 0.45);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.52rem 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.66rem;
      cursor: pointer;
    }

    @media (prefers-reduced-motion: reduce) {
      .stage { transition: none; }
    }
  </style>
  <script src="/assets/js/password-gate.js"></script>
</head>
<body>
  <div class="stage" id="stage" aria-hidden="true"></div>

  <div class="hud">
    <div class="topline">
      <a href="./">NEWAIYORK</a>
      <span><span id="index">01</span> / <span id="total">--</span></span>
    </div>

    <div class="copy" aria-live="polite">
      <p class="kicker" id="kicker">Morning preparations in NYC</p>
      <h1 id="line">Zip. Fold. Run.</h1>
      <p class="hint">Tap anywhere for next frame</p>
    </div>

    <div class="bottomline">
      <span id="meta">Wardrobe floor, first light</span>
      <div class="nav-links" aria-label="Site navigation">
        <a href="archive.html">Laurarchive</a>
        <a href="blog.html">Werkwelt</a>
      </div>
    </div>
  </div>

  <div class="controls" aria-label="Page controls">
    <button type="button" data-step="-1">Prev</button>
    <button type="button" data-step="1">Next</button>
  </div>

  <script>
    const dataPath = 'assets/data/morning-prep-today.json';
    const root = document.documentElement;
    const stage = document.getElementById('stage');
    const line = document.getElementById('line');
    const meta = document.getElementById('meta');
    const indexEl = document.getElementById('index');
    const totalEl = document.getElementById('total');
    const controls = document.querySelectorAll('[data-step]');

    let scenes = [];
    let index = 0;

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function render() {
      const scene = scenes[index];
      if (!scene) return;
      stage.style.setProperty('--photo', `url("${scene.image}")`);
      line.textContent = scene.line;
      meta.textContent = scene.meta;
      indexEl.textContent = pad(index + 1);
      totalEl.textContent = pad(scenes.length);
      const accent = ['#6f8fa3', '#ca6f8c', '#c2b080', '#93a48f'][index % 4];
      root.style.setProperty('--accent', accent);
    }

    function move(delta) {
      if (!scenes.length) return;
      index = (index + delta + scenes.length) % scenes.length;
      render();
    }

    controls.forEach((button) => {
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        move(Number(button.dataset.step) || 1);
      });
    });

    document.body.addEventListener('click', (event) => {
      if (event.target.closest('a, button')) return;
      move(1);
    });

    document.addEventListener('keydown', (event) => {
      if (['ArrowRight', 'ArrowDown', ' ', 'Enter'].includes(event.key)) {
        event.preventDefault();
        move(1);
      }
      if (['ArrowLeft', 'ArrowUp'].includes(event.key)) {
        event.preventDefault();
        move(-1);
      }
    });

    async function imageExists(path) {
      try {
        const res = await fetch(path, { method: 'HEAD', cache: 'no-store' });
        return res.ok;
      } catch {
        return false;
      }
    }

    async function loadScenes() {
      try {
        const response = await fetch(dataPath, { cache: 'no-store' });
        if (!response.ok) throw new Error('Could not load today image manifest');
        const declared = await response.json();
        const checks = await Promise.all(declared.map((scene) => imageExists(scene.image)));
        scenes = declared.filter((_, idx) => checks[idx]);

        if (!scenes.length) {
          line.textContent = 'Waiting for today\'s upload set.';
          meta.textContent = 'Drop JPGs into assets/morning-prep-today/';
          totalEl.textContent = '00';
          return;
        }

        render();
      } catch (error) {
        line.textContent = 'Could not load today\'s image set.';
        meta.textContent = 'Check assets/data/morning-prep-today.json';
        totalEl.textContent = '00';
        console.error(error);
      }
    }

    loadScenes();
  </script>
</body>
</html>
