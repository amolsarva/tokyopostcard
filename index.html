      background-position: center;

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(1rem, 3.5vw, 2.4rem);
      z-index: 3;
    }

    .topline,
    .bottomline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.68rem;
      color: var(--ink-soft);
      text-shadow: 0 2px 20px var(--shadow);
    }

    .topline a,
    .bottomline a {
      pointer-events: auto;
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(244, 239, 233, 0.5);
      padding-bottom: 2px;
    }

    .copy {
      max-width: min(78ch, 92vw);
      margin: auto 0;
      pointer-events: none;
      text-shadow: 0 4px 24px var(--shadow);
    }

    .kicker {
      margin: 0 0 0.7rem;
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 5.8rem);
      line-height: 0.98;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      max-width: 13ch;
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.86;
    }

    .controls {
      position: fixed;
      right: clamp(1rem, 3vw, 2rem);
      bottom: clamp(1rem, 3vw, 2rem);
      z-index: 4;
      display: flex;
      gap: 0.5rem;
    }

    .controls button {
      pointer-events: auto;
      border: 1px solid rgba(244, 239, 233, 0.5);
      background: rgba(12, 16, 23, 0.45);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.52rem 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.66rem;
      cursor: pointer;
    }

    @media (prefers-reduced-motion: reduce) {
      .stage { transition: none; }
    }
  </style>
