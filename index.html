<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Velvet Airlock · New AI York</title>
  <meta name="description" content="A private New AI York threshold." />
  <link rel="canonical" href="./" />
  <style>
    :root {
      color-scheme: dark;
      --black: #030403;
      --ink: #fff6ea;
      --muted: rgba(255, 246, 234, 0.68);
      --quiet: rgba(255, 246, 234, 0.48);
      --line: rgba(255, 246, 234, 0.22);
      --field: rgba(3, 4, 3, 0.58);
      --green: #55f0a0;
      --red: #ff5c4f;
      --gold: #d8b468;
      --steel: #98b5bc;
      font-family: Inter, "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--black);
      color: var(--ink);
    }

    body {
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .cover {
      position: relative;
      min-height: 100svh;
      display: grid;
      align-items: end;
      isolation: isolate;
      overflow: hidden;
      padding: calc(env(safe-area-inset-top) + 24px) clamp(18px, 4vw, 64px) calc(env(safe-area-inset-bottom) + 28px);
    }

    .cover::before,
    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .cover::before {
      background:
        linear-gradient(90deg, rgba(3, 4, 3, 0.92) 0%, rgba(3, 4, 3, 0.52) 42%, rgba(3, 4, 3, 0.18) 100%),
        linear-gradient(180deg, rgba(3, 4, 3, 0.26) 0%, rgba(3, 4, 3, 0.2) 48%, rgba(3, 4, 3, 0.9) 100%),
        url("assets/newaiyork/velvet-airlock-hero.jpg") center / cover no-repeat;
    }

    .cover::after {
      opacity: 0.28;
      background-image:
        linear-gradient(rgba(255, 246, 234, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 246, 234, 0.05) 1px, transparent 1px);
      background-size: 90px 90px;
      mask-image: linear-gradient(90deg, black, transparent 76%);
    }

    .mast {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 22px);
      left: clamp(18px, 4vw, 64px);
      right: clamp(18px, 4vw, 64px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .mast-mark {
      color: var(--ink);
      letter-spacing: 0.34em;
    }

    .signal {
      display: inline-grid;
      grid-template-columns: repeat(3, 7px);
      gap: 6px;
      align-items: center;
    }

    .signal span {
      width: 7px;
      height: 7px;
      background: var(--green);
      box-shadow: 0 0 18px rgba(85, 240, 160, 0.8);
    }

    .signal span:nth-child(2) {
      background: var(--gold);
      box-shadow: 0 0 18px rgba(216, 180, 104, 0.78);
    }

    .signal span:nth-child(3) {
      background: var(--red);
      box-shadow: 0 0 18px rgba(255, 92, 79, 0.72);
    }

    .stage {
      width: min(1160px, 100%);
      display: grid;
      gap: clamp(28px, 5vw, 64px);
      align-items: end;
      grid-template-columns: minmax(0, 1fr);
    }

    .title-block {
      display: grid;
      gap: 16px;
      max-width: 780px;
    }

    .kicker,
    .field-label,
    .error,
    .status-line,
    .entry-link {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .kicker {
      color: var(--steel);
    }

    h1 {
      margin: 0;
      max-width: 9ch;
      font-size: clamp(4.4rem, 13vw, 12rem);
      line-height: 0.82;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .subline {
      width: min(520px, 100%);
      height: 2px;
      background: linear-gradient(90deg, var(--green), var(--gold) 48%, var(--red));
      box-shadow: 0 0 26px rgba(85, 240, 160, 0.34);
    }

    .gate {
      width: min(390px, 100%);
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(3, 4, 3, 0.48);
      backdrop-filter: blur(22px);
      box-shadow: 0 26px 90px rgba(0, 0, 0, 0.44);
    }

    .field-label {
      display: grid;
      gap: 9px;
      color: var(--muted);
    }

    .password-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      border: 1px solid rgba(255, 246, 234, 0.28);
      background: var(--field);
    }

    .password-row:focus-within {
      border-color: rgba(85, 240, 160, 0.72);
      box-shadow: 0 0 0 3px rgba(85, 240, 160, 0.16);
    }

    input {
      min-width: 0;
      border: 0;
      outline: 0;
      padding: 14px;
      background: transparent;
      color: var(--ink);
      font-size: 1rem;
      letter-spacing: 0;
    }

    button {
      border: 0;
      border-left: 1px solid rgba(255, 246, 234, 0.24);
      padding: 0 15px;
      background: rgba(255, 246, 234, 0.94);
      color: var(--black);
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .error {
      min-height: 1rem;
      margin: 0;
      color: #ffb5ac;
    }

    .unlocked {
      display: none;
      gap: 12px;
      border-top: 1px solid rgba(255, 246, 234, 0.18);
      padding-top: 14px;
    }

    .is-open .unlocked {
      display: grid;
    }

    .is-open .field-label,
    .is-open .password-row,
    .is-open .error {
      display: none;
    }

    .status-line {
      margin: 0;
      color: var(--green);
    }

    .entry-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .entry-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid rgba(255, 246, 234, 0.24);
      background: rgba(255, 246, 234, 0.08);
      color: var(--ink);
    }

    noscript {
      position: fixed;
      inset: auto 18px 18px;
      z-index: 2;
      padding: 14px;
      border: 1px solid var(--line);
      background: var(--black);
      color: var(--ink);
    }

    @media (min-width: 860px) {
      .stage {
        grid-template-columns: minmax(0, 1fr) minmax(320px, 390px);
      }
    }

    @media (max-width: 680px) {
      .cover {
        min-height: 100dvh;
      }

      .mast {
        align-items: flex-start;
      }

      h1 {
        font-size: clamp(3.6rem, 19vw, 6.4rem);
      }

      .gate {
        padding: 14px;
      }

      .password-row {
        grid-template-columns: 1fr;
      }

      button {
        min-height: 44px;
        border-left: 0;
        border-top: 1px solid rgba(255, 246, 234, 0.24);
      }
    }
  </style>
</head>
<body>
  <main class="cover" aria-labelledby="cover-title">
    <header class="mast" aria-label="New AI York">
      <div class="mast-mark">NEWAIYORK</div>
      <div class="signal" aria-hidden="true"><span></span><span></span><span></span></div>
    </header>

    <section class="stage">
      <div class="title-block">
        <p class="kicker">New AI York</p>
        <h1 id="cover-title">Velvet Airlock</h1>
        <div class="subline" aria-hidden="true"></div>
      </div>

      <form class="gate" id="gate" autocomplete="off">
        <label class="field-label" for="password">Passphrase</label>
        <div class="password-row">
          <input id="password" name="password" type="password" autocomplete="current-password" />
          <button type="submit">Enter</button>
        </div>
        <p class="error" id="gate-error" role="alert" aria-live="polite"></p>
        <div class="unlocked" aria-live="polite">
          <p class="status-line">Access open</p>
          <div class="entry-links" aria-label="Private entries">
            <a class="entry-link" href="archive.html">Archive</a>
            <a class="entry-link" href="blog.html">Werkwelt</a>
          </div>
        </div>
      </form>
    </section>
  </main>

  <noscript>This threshold needs JavaScript.</noscript>
  <script src="assets/js/password-gate.js" data-password-gate="manual"></script>
  <script>
    const gate = document.getElementById("gate");
    const input = document.getElementById("password");
    const error = document.getElementById("gate-error");
    const button = gate.querySelector("button");

    const openGate = () => {
      gate.classList.add("is-open");
      input.value = "";
    };

    window.NewAIYorkGate.ready.then((hasAccess) => {
      if (hasAccess) {
        openGate();
      } else {
        input.focus();
      }
    });

    gate.addEventListener("submit", async (event) => {
      event.preventDefault();
      error.textContent = "";
      button.disabled = true;

      try {
        if (await window.NewAIYorkGate.verify(input.value)) {
          openGate();
          return;
        }

        error.textContent = "That did not open it.";
        input.select();
      } catch (verificationError) {
        error.textContent = verificationError.message;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
