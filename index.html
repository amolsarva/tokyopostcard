<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>a new AI York</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #081221;
      color: #ffffff;
    }

    body {
      min-height: 100vh;
      display: grid;
      grid-template-rows: minmax(18rem, 66vh) auto;
      padding: 0;
      gap: 0;
    }

    .hero {
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(180deg, #1d4f89 0%, #123b6d 58%, #0d2d54 100%);
      position: relative;
      padding: 2rem;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 11vw, 7rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .archives {
      padding: 1.4rem 2rem 1.8rem;
      justify-self: center;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.66rem;
      width: 100%;
      background: #081221;
    }

    .archives-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.4rem 1rem;
      letter-spacing: 0.1em;
    }

    .archives-list a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Good Morning Laura</h1>
  </main>

  <footer class="archives">
    <span>Filed archives</span>
    <ul class="archives-list" id="archiveList">
      <li><span style="opacity:0.5">Loading...</span></li>
    </ul>
  </footer>

  <script>
    const archiveList = document.getElementById('archiveList');

    async function hydrateArchives() {
      try {
        const response = await fetch('./archives/manifest.json', { cache: 'no-store' });
        if (!response.ok) {
          renderArchiveList([]);
          return;
        }

        const entries = await response.json();
        renderArchiveList(entries);
      } catch {
        renderArchiveList([]);
      }
    }

    function renderArchiveList(entries) {
      archiveList.innerHTML = '';

      if (!Array.isArray(entries) || !entries.length) {
        const li = document.createElement('li');
        li.style.opacity = '0.5';
        li.textContent = 'No archives yet';
        archiveList.appendChild(li);
        return;
      }

      entries.forEach((entry) => {
        const li = document.createElement('li');
        const link = document.createElement('a');
        link.href = `./archives/${entry.slug}/`;
        link.textContent = entry.label || entry.slug;
        link.title = entry.blurb || 'Open archived postcard';
        li.appendChild(link);
        archiveList.appendChild(li);
      });
    }

    hydrateArchives();
  </script>
</body>
</html>
