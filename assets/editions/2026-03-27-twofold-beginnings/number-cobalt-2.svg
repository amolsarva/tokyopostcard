<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-label="Cobalt enamel number 2">
  <defs>
    <linearGradient id="cobaltBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#04122a" />
      <stop offset="60%" stop-color="#083c7b" />
      <stop offset="100%" stop-color="#74c2ff" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="noise" mode="soft-light" />
    </filter>
  </defs>
  <rect width="1200" height="1600" rx="80" fill="url(#cobaltBg)" filter="url(#grain)"/>
  <text x="600" y="1050" text-anchor="middle" font-family="'Space Grotesk','Inter','Arial Black',sans-serif" font-size="900" font-weight="700" fill="#f6fbff">2</text>
</svg>
