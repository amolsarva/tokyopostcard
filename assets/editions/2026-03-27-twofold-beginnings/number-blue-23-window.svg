<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title>Blue 23 Window</title>
  <desc>Stylized typographic rendition for the blue 23 window visual.</desc>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f5cc6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="80" y="80" width="1120" height="560" rx="24" ry="24" fill="none" stroke="#cfe0ff" stroke-width="14"/>
  
  <text x="640" y="420" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="300" font-weight="800" fill="#cfe0ff">23</text>
</svg>
