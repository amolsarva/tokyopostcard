<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>newAIyork · EDITION_TITLE</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --text-shadow: 0 16px 56px rgba(0, 0, 0, 0.75);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #050505;
      color: #f8f8f8;
      overflow: hidden;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: #0a0a0a center / cover no-repeat;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 1s ease, transform 1.6s ease;
    }
    .backdrop.visible { opacity: 1; transform: scale(1); }

    .vignette::before,
    .vignette::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .vignette::before {
      background: radial-gradient(circle at 50% 12%, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.86));
    }
    .vignette::after {
      background-image: linear-gradient(rgba(255,255,255,0.05), rgba(255,255,255,0));
      mix-blend-mode: screen;
      opacity: 0.17;
    }

    .hud {
      position: fixed;
      top: 3%;
      left: 5%;
      right: 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.75rem;
      pointer-events: none;
      z-index: 2;
    }
    .hud button, .brand-link { pointer-events: auto; }
    .brand-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.35);
      padding-bottom: 2px;
    }
    .counter { font-variant-numeric: tabular-nums; }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.45rem 1.35rem;
      background: rgba(0,0,0,0.52);
      color: inherit;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      cursor: pointer;
    }

    .story {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.9rem;
      text-align: left;
      padding: 19vh 8% 22vh;
      pointer-events: none;
    }
    .story.reveal { animation: fadeText 0.85s ease; }
    @keyframes fadeText {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .whisper {
      margin: 0;
      font-size: clamp(0.88rem, 2.5vw, 1.08rem);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      opacity: 0.9;
      text-shadow: var(--text-shadow);
    }
    .main-line {
      margin: 0;
      font-size: clamp(2.2rem, 7.4vw, 4.4rem);
      line-height: 1.1;
      font-weight: 600;
      max-width: 18ch;
      text-shadow: var(--text-shadow);
    }

    .footer {
      position: fixed;
      bottom: 3%;
      left: 5%;
      right: 5%;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      text-align: center;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      font-size: 0.72rem;
      z-index: 2;
    }
    .archives { display: flex; justify-content: center; }
    .archives-link {
      margin-top: 0.35rem;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding-bottom: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .backdrop, .story.reveal { transition: none; animation: none; }
    }
  </style>
  <script src="/assets/js/password-gate.js"></script>
</head>
<body data-manifest="../manifest.json" data-archives-base=".." data-audio="">
  <div class="backdrop" id="backdrop"></div>
  <div class="vignette"></div>

  <div class="hud">
    <a class="brand-link" href="../../">NEWAIYORK</a>
    <div class="counter" id="counter">00 / 00</div>
    <button id="soundToggle" aria-pressed="false">Sound</button>
  </div>

  <div class="story" id="story">
    <p class="whisper" id="whisper">tap to begin</p>
    <p class="main-line" id="mainLine">EDITION intro line.</p>
  </div>

  <div class="footer">
    <div id="micro">Touch anywhere</div>
    <div class="archives">
      <a class="archives-link" href="../../archive.html">LAURARCHIVE</a>
    </div>
  </div>

  <audio id="ambience" loop preload="auto"></audio>

  <script>
    const editionMeta = {
      introWhisper: 'tap to begin',
      introLine: 'EDITION intro line.',
      epilogueWhisper: 'Edition complete',
      epilogueLine: 'Tap anywhere when you are ready to replay this edition.',
      epilogueMicro: 'Replay ritual'
    };

    const scenes = [
      {
        image: 'assets/photos/scene-01.jpg',
        fallback: 'linear-gradient(120deg, #111827, #1f2937, #4b5563)',
        whisper: 'Scene one cue',
        line: 'Primary copy for scene one.',
        micro: 'Tap to continue'
      },
      {
        image: 'assets/photos/scene-02.jpg',
        fallback: 'linear-gradient(120deg, #1e1b4b, #312e81, #6366f1)',
        whisper: 'Scene two cue',
        line: 'Primary copy for scene two.',
        micro: 'Tap for next frame'
      }
    ];

    const backdrop = document.getElementById('backdrop');
    const whisper = document.getElementById('whisper');
    const mainLine = document.getElementById('mainLine');
    const micro = document.getElementById('micro');
    const counter = document.getElementById('counter');
    const story = document.getElementById('story');
    const soundToggle = document.getElementById('soundToggle');
    const audio = document.getElementById('ambience');

    whisper.textContent = editionMeta.introWhisper;
    mainLine.textContent = editionMeta.introLine;
    counter.textContent = `00 / ${String(scenes.length).padStart(2, '0')}`;

    const audioSource = document.body.dataset.audio || '';
    if (audioSource) {
      audio.src = audioSource;
    } else {
      soundToggle.hidden = true;
      soundToggle.disabled = true;
      soundToggle.setAttribute('aria-hidden', 'true');
    }

    const imageAvailability = new Map();
    function preloadImage(path) {
      if (!path || imageAvailability.has(path)) return;
      imageAvailability.set(path, null);
      const img = new Image();
      img.onload = () => imageAvailability.set(path, true);
      img.onerror = () => imageAvailability.set(path, false);
      img.src = path;
    }
    scenes.forEach((scene) => preloadImage(scene.image));

    let pointer = -1;
    let locked = false;

    function applyBackground(scene) {
      const availability = scene.image ? imageAvailability.get(scene.image) : false;
      if (scene.image && availability !== false) {
        backdrop.style.backgroundImage = `url('${scene.image}')`;
      } else {
        backdrop.style.backgroundImage = scene.fallback || 'linear-gradient(120deg, #111, #333)';
      }
      backdrop.classList.add('visible');
    }

    function renderScene() {
      const scene = scenes[pointer];
      if (!scene) return;
      applyBackground(scene);
      whisper.textContent = scene.whisper || '';
      mainLine.textContent = scene.line || '';
      micro.textContent = scene.micro || 'Tap to continue';
      counter.textContent = `${String(pointer + 1).padStart(2, '0')} / ${String(scenes.length).padStart(2, '0')}`;
      story.classList.remove('reveal');
      void story.offsetWidth;
      story.classList.add('reveal');
    }

    function showEpilogue() {
      pointer = -1;
      whisper.textContent = editionMeta.epilogueWhisper;
      mainLine.textContent = editionMeta.epilogueLine;
      micro.textContent = editionMeta.epilogueMicro;
      counter.textContent = '∞';
      story.classList.remove('reveal');
      void story.offsetWidth;
      story.classList.add('reveal');
    }

    function advanceScene() {
      if (locked) return;
      locked = true;
      setTimeout(() => { locked = false; }, 420);
      pointer += 1;
      if (pointer >= scenes.length) {
        showEpilogue();
        return;
      }
      renderScene();
      if ('vibrate' in navigator) navigator.vibrate(12);
    }

    function isInteractiveControl(target) {
      return Boolean(target.closest('button, a, input, textarea, select, [role="button"]'));
    }

    document.body.addEventListener('click', (event) => {
      if (isInteractiveControl(event.target)) return;
      advanceScene();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        advanceScene();
      }
    });

    soundToggle.addEventListener('click', (event) => {
      event.stopPropagation();
      const pressed = soundToggle.getAttribute('aria-pressed') === 'true';
      const nextState = !pressed;
      soundToggle.setAttribute('aria-pressed', String(nextState));
      soundToggle.textContent = nextState ? 'Sound ▸' : 'Sound';
      if (nextState) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } else {
        audio.pause();
      }
    });
  </script>
</body>
</html>
